services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5

  order-service:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "3002:3002"
    # Overwrite the default command to run specific service in watch mode
    command: npx nest start order-service --watch
    volumes:
      # Sync source code for live-reload
      - .:/usr/src/app
      # Avoid overriding linux node_modules with windows node_modules
      - /usr/src/app/node_modules
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - PORT=3002
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=2000
      - WATCHPACK_POLLING=true
    depends_on:
      rabbitmq:
        condition: service_healthy

  email-service:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: email-service
    ports:
      - "3001:3001"
    command: npx nest start email-service --watch
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - PORT=3001
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=2000
      - WATCHPACK_POLLING=true
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
